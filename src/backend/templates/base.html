<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Mergulho Virtual{% endblock %}</title>
    <link href="{{ url_for('static', path='/styles.css') }}" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%2322d3ee'/><stop offset='1' stop-color='%230891b2'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='url(%23g)'/><path d='M5 19c2.5-3 5-3 7.5 0s5 3 7.5 0 5-3 7.5 0' fill='none' stroke='white' stroke-width='2.4' stroke-linecap='round'/><circle cx='22' cy='11' r='2.4' fill='white'/></svg>">
    {% block head_extra %}{% endblock %}
</head>
<body>
    <header class="site-header">
        <div class="site-header__inner">
            <a href="/" class="brand" aria-label="Mergulho Virtual">
                <span class="brand__logo" aria-hidden="true">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 15c1.8-2.2 3.6-2.2 5.4 0s3.6 2.2 5.4 0 3.6-2.2 5.4 0 1.8 0 1.8 0"/>
                        <path d="M3 19c1.8-2.2 3.6-2.2 5.4 0s3.6 2.2 5.4 0 3.6-2.2 5.4 0"/>
                        <circle cx="16" cy="7" r="2"/>
                    </svg>
                </span>
                <span class="brand__title">
                    <span>Mergulho Virtual</span>
                    <small>Painel de dados</small>
                </span>
            </a>
            <nav class="site-nav" aria-label="Navegação principal">
                <a href="/avistamentos" class="{% if active_nav == 'avistamentos' %}is-active{% endif %}">Avistamentos</a>
                <a href="/telemetria" class="{% if active_nav == 'telemetria' %}is-active{% endif %}">Telemetria</a>
            </nav>
        </div>
    </header>

    <main class="site-main {% block main_class %}{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        Mergulho Virtual · Fernando de Noronha · {{ now_year or '' }}
    </footer>

    {% block body_end %}{% endblock %}
</body>
</html>
